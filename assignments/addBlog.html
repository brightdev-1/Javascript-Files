<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Blog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <h1 class="text-danger text-center p-5">Create Blog</h1>

    <div class="container">
        <form id="addBlog">

            <div class="mb-3">
                <label class="form-label">Title:</label>
                <input type="text" class="form-control" name="title" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Image:</label>
                <input type="text" class="form-control" name="image" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Content:</label>
                <input type="text" class="form-control" name="content" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Author:</label>
                <input type="text" class="form-control" name="author" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Likes:</label>
                <input type="number" class="form-control" name="likes" required>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" name="isPublish">
                <label class="form-check-label">Publish</label>
            </div>

            <button type="submit" class="btn btn-primary">
                Submit
            </button>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

        import {
            getFirestore,
            collection,
            addDoc,
        } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAFIjpmTKjei2rkrgXyMbA5pdGlH-RDr1M",
            authDomain: "juneblog-54e35.firebaseapp.com",
            projectId: "juneblog-54e35",
            storageBucket: "juneblog-54e35.firebasestorage.app",
            messagingSenderId: "84672277747",
            appId: "1:84672277747:web:d2cae53eed249ddac95b86",
            measurementId: "G-KX6MKSN7FP"
        };

        const app = initializeApp(firebaseConfig);
        console.log(app);

        const db = getFirestore();
        console.log(db);

        const colRef = collection(db, "blog");
        console.log(colRef);

        const addBlog = document.getElementById("addBlog");
        console.log(addBlog);

        addBlog.addEventListener("submit", async (event) => {
            event.preventDefault();
            createBlogPost();
        });

        async function createBlogPost() {
            const formData = {
                title: addBlog.title.value,
                image: addBlog.image.value,
                content: addBlog.content.value,
                author: addBlog.author.value,
                likes: addBlog.likes.value,
                isPublish: addBlog.isPublish.checked
            };

            console.log(formData);

            try {
                const docRef = await addDoc(colRef, formData);
                console.log("document with reference id", docRef.id);
                alert("Blog post created successfully!");
                window.location.href = "firebase.html";
            } catch (error) {
                console.log(error);
            }
        }
    </script>

</body>

</html>
