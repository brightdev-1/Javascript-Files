<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./newclasswork.css">
</head>

<body>
    <div class="calculator">
        <div class="title-bar">
            <span><i class="fa-solid fa-calculator"></i> calculator</span>
            <span>— ▢ ✕</span>
        </div>

        <br>

        <div class="mode">
            <span><i class="fa-solid fa-bars"></i> Standard</span>
        </div>

        <br>

        <div class="display-area">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>

        <div class="memory-row">
            <button disabled>MC</button>
            <button disabled>MR</button>
            <button disabled>M+</button>
            <button disabled>M-</button>
            <button disabled>MS</button>
            <button disabled>M▾</button>
        </div>
        
        <div class="keypad">
            <button>%</button>
            <button>CE</button>
            <button>C</button>
            <button><i class="fa-solid fa-delete-left"></i></button>

            <button>1/x</button>
            <button>x²</button>
            <button>√x</button>
            <button>÷</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>×</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>
            
            <button>±</button>
            <button>0</button>
            <button>.</button>
            <button class="equals">=</button>
        </div>


    </div>
</body>

</html>
