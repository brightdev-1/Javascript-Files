<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="./calsswork.css">
</head>

<body>

    <div class="calculator">

        <div class="title-bar">
            <span>🖩 calculator</span>
            <span>— ▢ ✕</span>
        </div>

        <div class="mode-bar">☰ Standard</div>

        <div class="display-area">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        
        <div class="memory-row">
            <button disabled>MC</button>
            <button disabled>MR</button>
            <button disabled>M+</button>
            <button disabled>M-</button>
            <button disabled>MS</button>
            <button disabled>M▾</button>
        </div>


        <div class="keypad">
            <button data-action="percent">%</button>
            <button data-action="clear-entry">CE</button>
            <button data-action="clear">C</button>
            <button data-action="backspace">⌫</button>

            <button data-action="reciprocal">1/x</button>
            <button data-action="square">x²</button>
            <button data-action="sqrt">√x</button>
            <button data-action="divide">÷</button>

            <button data-action="digit">7</button>
            <button data-action="digit">8</button>
            <button data-action="digit">9</button>
            <button data-action="multiply">×</button>

            <button data-action="digit">4</button>
            <button data-action="digit">5</button>
            <button data-action="digit">6</button>
            <button data-action="subtract">−</button>

            <button data-action="digit">1</button>
            <button data-action="digit">2</button>
            <button data-action="digit">3</button>
            <button data-action="add">+</button>

            <button data-action="negate">±</button>
            <button data-action="digit">0</button>
            <button data-action="decimal">.</button>
            <button class="equals" data-action="equals">=</button>
        </div>

    </div>

    <script src="./classwork.js"></script>
</body>

</html>
