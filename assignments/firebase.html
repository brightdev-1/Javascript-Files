<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Blogs</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 45%, #fdf2f8 100%);
            color: #0f172a;
            padding: 24px;
        }

        .page-shell {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.65);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
            padding: 28px;
        }

        h1 {
            margin-top: 0;
            text-align: center;
            font-size: 2.2rem;
            background: linear-gradient(90deg, #4f46e5, #e11d48);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .blogs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .blog-card {
            background: white;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.09);
            border: 1px solid #e2e8f0;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .blog-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 34px rgba(15, 23, 42, 0.14);
        }

        .blog-card a {
            text-decoration: none;
            color: #111827;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .blog-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 14px;
            margin: 12px 0;
        }

        .blog-content {
            color: #475569;
            line-height: 1.6;
            margin: 8px 0 12px;
        }

        .blog-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            color: #334155;
            font-weight: 600;
        }

        .likes-pill {
            background: #eef2ff;
            color: #4338ca;
            padding: 7px 10px;
            border-radius: 999px;
        }

        .status-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 7px 10px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .status-badge.published {
            background: #dcfce7;
            color: #166534;
        }

        .status-badge.draft {
            background: #fef3c7;
            color: #92400e;
        }

        @media (max-width: 700px) {
            body {
                padding: 12px;
            }

            .page-shell {
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="page-shell">
        <h1>All Blog</h1>
        <div id="display" class="blogs-grid"></div>
    </div>
</body>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

    import {
        getFirestore,
        collection,
        getDocs,
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    // Your web app's Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAFIjpmTKjei2rkrgXyMbA5pdGlH-RDr1M",
        authDomain: "juneblog-54e35.firebaseapp.com",
        projectId: "juneblog-54e35",
        storageBucket: "juneblog-54e35.firebasestorage.app",
        messagingSenderId: "84672277747",
        appId: "1:84672277747:web:d2cae53eed249ddac95b86",
        measurementId: "G-KX6MKSN7FP"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    console.log(app);

    const db = getFirestore(app);
    console.log(db);

    const colRef = collection(db, "blog");
    console.log(colRef);

    const blogArr = [];

    async function getAllBlogs() {
        try {

            // Query database
            const querySnapShot = await getDocs(colRef);

            console.log(querySnapShot);

            querySnapShot.forEach((doc) => {

                const data = {
                    id: doc.id, ...doc.data()
                };

                blogArr.push(data);
                console.log(blogArr);

                displayAllBlogs();
            });

        } catch (error) {
            console.log(error);
        }
    }

    function displayAllBlogs() {

        let display = document.getElementById("display");

        display.innerHTML = "";

        blogArr.forEach((blog) => {

            const {
                title,
                image,
                content,
                author,
                likes,
                isPublish
            } = blog;

            display.innerHTML += `
        <div class="blog-card">
            <h2>
                <a href="./blogs.html?id=${blog.id}">${title}</a>
            </h2>

            <img src="${image}" alt="${title}" class="blog-image">

            <p class="blog-content">${content.slice(0, 100)}...</p>

            <div class="blog-meta">
                <span>Author: ${author}</span>
                <span class="likes-pill">Likes: ${likes}</span>
            </div>

            <p class="status-badge ${isPublish ? "published" : "draft"}">${isPublish ? "Published" : "Not published"}</p>
        </div>
        `;
        });
    }

    getAllBlogs();

</script>

</html>
