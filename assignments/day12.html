<!DOCTYPE html>
<html>
<head>
<title>Quiz Application</title>
<style>
  body {  max-width: 900px; margin: 40px auto; }
  h2 { text-align: center; }
  hr { margin-bottom: 10px; }
  #score { color: green; }
  label { display: block; margin: 6px 0; }
  .bar { display: flex; justify-content: space-between; margin-top: 20px; }
  button { padding: 8px 16px; }
  #submit { width: 100%; margin-top: 10px; background: teal; color: #fff; padding: 10px; border: none; }
</style>
</head>
<body>
  <h2>Quiz Application</h2>
  <hr>
  <!-- <div id="score">Your score is 0 / 2</div> -->
  <div id="progress">Question 1 of 4</div>
  <h3 id="question"></h3>
  <div id="options"></div>

  <div class="bar">
    <button onclick="prevQ()">Prev</button>
    <button onclick="nextQ()">Next</button>
  </div>
  <button id="submit" onclick="submitQuiz()">Submit</button>

<script src="day12.js"></script>
</body>
</html>
