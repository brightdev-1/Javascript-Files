<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background-color: black;
        }

        .top-ui {
            text-align: center;
            padding: 15px;
        }

        .display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .product-card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            background: beige;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.3s ease;
        }

        .product-card:hover {
            transform: scale(1.03);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
        }

        .title {
            font-size: 16px;
            margin: 10px 0;
        }

        .category {
            font-size: 12px;
            color: gray;
        }

        .description {
            height: 50px;
            overflow: hidden;
            transition: 0.3s ease;
        }

        .description.expanded {
            height: auto;
        }

        .toggle-btn {
            margin-top: 10px;
            padding: 8px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .toggle-btn:hover {
            background: #0056b3;
        }

        .price {
            margin-top: 10px;
            font-weight: bold;
            color: green;
        }

        #error {
            color: red;
        }
    </style>
</head>

<body>

    <div class="top-ui">
        <div class="spinner-border text-primary" role="status" id="spinner"></div>
        <p id="error"></p>
    </div>

    <div class="display"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./api-creation.js"></script>

</body>

</html>
